# Evolutionary Ops — Hermes dashboard theme
#
# Cold/Critical palette for monitoring the self-evolution batch pipeline.
# Deep blues and near-black canvas clearly distinguish stable evolution
# (blue/cyan) from stalled or failed tasks (red/orange).
#
# Paired with the evolution-hub plugin at ~/.hermes/plugins/evolution-hub/
# for the full Evolution Hub experience.
name: evolutionary-ops
label: "Evolutionary Ops"
description: "Cold/Critical cockpit — deep navy + cyan + amber alerts"

palette:
  background:
    hex: "#0a0e1a"
    alpha: 1.0
  midground: "#c8d8f0"
  foreground:
    hex: "#ffffff"
    alpha: 0
  warmGlow: "rgba(59, 130, 246, 0.18)"
  noiseOpacity: 0.6

typography:
  fontSans: '"Inter", "SF Pro", ui-sans-serif, system-ui, sans-serif'
  fontMono: '"JetBrains Mono", "SF Mono", ui-monospace, monospace'
  fontDisplay: '"Inter", "SF Pro", system-ui, sans-serif'
  fontUrl: "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
  baseSize: "13px"
  lineHeight: "1.5"
  letterSpacing: "0.02em"

layout:
  radius: "6px"
  density: compact

layoutVariant: cockpit

assets:
  bg: "linear-gradient(135deg, #0a0e1a 0%, #111827 50%, #0f172a 100%)"
  hero: ""
  crest: ""

componentStyles:
  card:
    background: "linear-gradient(180deg, rgba(15, 23, 42, 0.90) 0%, rgba(12, 16, 28, 0.95) 100%)"
    boxShadow: "inset 0 0 0 1px rgba(59, 130, 246, 0.15), 0 0 12px -6px rgba(59, 130, 246, 0.3)"
  header:
    background: "linear-gradient(180deg, rgba(17, 24, 39, 0.95) 0%, rgba(10, 14, 26, 0.9) 100%)"
  sidebar:
    background: "linear-gradient(180deg, rgba(12, 18, 34, 0.88) 0%, rgba(10, 14, 26, 0.85) 100%)"
  tab:
    clipPath: "polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%)"
  backdrop:
    backgroundSize: "cover"
    backgroundPosition: "center"
    fillerOpacity: "1"
    fillerBlendMode: "normal"

colorOverrides:
  primary: "#3b82f6"
  primaryForeground: "#ffffff"
  accent: "#60a5fa"
  accentForeground: "#ffffff"
  ring: "#3b82f6"
  success: "#22c55e"
  warning: "#eab308"
  destructive: "#ef4444"
  muted: "#64748b"
  mutedForeground: "#94a3b8"
  border: "rgba(59, 130, 246, 0.18)"

customCSS: |
  /* Scanline overlay — subtle holographic feel during batch activity */
  :root[data-layout-variant="cockpit"] body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(59, 130, 246, 0.025) 3px,
      rgba(59, 130, 246, 0.025) 4px
    );
    mix-blend-mode: screen;
  }

  /* Brighter muted text for better contrast on navy background */
  .text-muted-foreground {
    color: #94a3b8 !important;
  }

  /* Status badges — critical colours stand out on dark canvas */
  .evolution-status-running {
    color: #22c55e;
    text-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
  }
  .evolution-status-completed,
  .evolution-status-no_improvement {
    color: #60a5fa;
    text-shadow: 0 0 6px rgba(96, 165, 250, 0.3);
  }
  .evolution-status-failed {
    color: #ef4444;
    text-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
  }
  .evolution-status-pending {
    color: #64748b;
  }

  /* Queue table row hover */
  .evolution-queue-row:hover {
    background: rgba(59, 130, 246, 0.06);
    transition: background 0.15s ease;
  }

  /* Queue table rows — tighter spacing */
  .evolution-queue-row {
    padding-top: 0.375rem !important;
    padding-bottom: 0.375rem !important;
  }

  /* Log viewer — terminal-like monospace block */
  .evolution-log-viewer {
    font-family: "JetBrains Mono", "SF Mono", ui-monospace, monospace;
    font-size: 11px;
    line-height: 1.5;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(59, 130, 246, 0.12);
    border-radius: 4px;
  }

  /* Sidebar control buttons */
  .evolution-control-btn {
    transition: all 0.15s ease;
  }
  .evolution-control-btn:hover {
    filter: brightness(1.2);
  }
  .evolution-control-btn:active {
    transform: scale(0.97);
  }
